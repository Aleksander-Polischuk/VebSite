<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Підтвердження реєстрації</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f4f4f4; 
            font-family: Arial, sans-serif; 
        }

        table { 
            border-collapse: collapse; 
        }
        
        .wrapper { 
            padding: 40px 0; 
        }

        .container { 
            width: 600px; 
            max-width: 100%; 
            background-color: #ffffff; 
            border-radius: 8px; 
            overflow: hidden; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            margin: 0 auto; 
        }
        
        .header { 
            padding: 30px 40px 20px 40px; 
        }

        .logo { 
            display: block; 
            border: 0; 
            width: 250px; 
        }
        
        .divider { 
            background-color: #3C9ADC; 
            height: 3px; 
            font-size: 0; 
            line-height: 0; 
        }
        
        .content { 
            padding: 40px; 
        }

        .title { 
            color: #333333; 
            font-size: 20px; 
            font-weight: bold; 
            padding-bottom: 20px; 
        }

        .text { 
            color: #555555; 
            font-size: 16px; 
            line-height: 24px; 
            padding-bottom: 30px; 
        }
        
        .button-wrapper { 
            padding-bottom: 30px; 
            text-align: center; 
        }

        .button-bg { 
            background-color: #3C9ADC; 
            border-radius: 6px; 
        }

        .btn { 
            display: inline-block; 
            padding: 14px 30px; 
            font-family: Arial, sans-serif; 
            font-size: 16px; 
            font-weight: bold; 
            color: #ffffff; 
            text-decoration: none; 
            border-radius: 6px; 
        }
    </style>
</head>
<body>
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" class="wrapper">
                <table border="0" cellpadding="0" cellspacing="0" class="container">
                    <tr>
                        <td align="left" class="header">
                            <img src="http://develop.kgonline.in.ua/img/logo.png" alt="Логотип" class="logo">
                        </td>
                    </tr>
                    <tr><td class="divider">&nbsp;</td></tr>
                    <tr>
                        <td class="content">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td class="title">
                                        Підтвердження Email
                                    </td>
                                </tr>
                                <tr>
                                    <td class="text">
                                        Дякуємо за реєстрацію! Для активації вашого облікового запису підтвердьте вашу електронну пошту.
                                    </td>
                                </tr>
                                <tr>
                                    <td align="center" class="button-wrapper">
                                        <table border="0" cellpadding="0" cellspacing="0">
                                            <tr>
                                                <td align="center" class="button-bg">
                                                    <a href="{{LINK}}" target="_blank" class="btn">Підтвердити пошту</a>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
